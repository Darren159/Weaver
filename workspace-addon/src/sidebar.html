<!DOCTYPE html>
<html lang="en">
<head>
  <base target="_top">
  <meta charset="utf-8">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Google Sans', Roboto, Arial, sans-serif;
      font-size: 13px;
      color: #202124;
      background: #fff;
      padding: 12px;
    }

    /* Header */
    .header { margin-bottom: 12px; }
    .header h1 { font-size: 15px; font-weight: 600; color: #1a73e8; }
    .doc-title {
      font-size: 11px;
      color: #5f6368;
      margin-top: 2px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    /* Buttons */
    button {
      display: block;
      width: 100%;
      padding: 8px 12px;
      border: none;
      border-radius: 4px;
      font-size: 13px;
      font-family: inherit;
      cursor: pointer;
      transition: background 0.15s;
    }
    .btn-primary { background: #1a73e8; color: #fff; font-weight: 500; }
    .btn-primary:hover { background: #1765cc; }
    .btn-primary:disabled { background: #a8c7fa; cursor: default; }
    .btn-secondary {
      background: #fff;
      color: #1a73e8;
      border: 1px solid #dadce0;
      margin-top: 6px;
    }
    .btn-secondary:hover { background: #f1f3f4; }
    .btn-secondary:disabled { color: #aaa; border-color: #eee; cursor: default; }
    .btn-row { display: flex; gap: 8px; margin-top: 8px; }
    .btn-row button { margin-top: 0; }

    /* Sections */
    .section { margin-top: 14px; }
    .section-label {
      font-size: 11px;
      font-weight: 600;
      color: #5f6368;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 6px;
    }
    hr { border: none; border-top: 1px solid #f1f3f4; margin: 14px 0; }

    /* Suggestion box */
    #suggestion-box {
      display: none;
      background: #f8f9fa;
      border: 1px solid #dadce0;
      border-radius: 6px;
      padding: 10px;
      margin-top: 10px;
      white-space: pre-wrap;
      word-break: break-word;
      line-height: 1.5;
      max-height: 200px;
      overflow-y: auto;
      color: #1a73e8;
      font-size: 13px;
    }

    /* Status */
    .status {
      font-size: 11px;
      color: #5f6368;
      margin-top: 6px;
      min-height: 15px;
    }
    .status.error { color: #d93025; }

    /* Related docs */
    .result-item {
      padding: 6px 0;
      border-bottom: 1px solid #f1f3f4;
    }
    .result-item:last-child { border-bottom: none; }
    .result-title { font-weight: 500; font-size: 12px; color: #202124; }
    .result-snippet {
      font-size: 11px;
      color: #5f6368;
      margin-top: 2px;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    #results-list { margin-top: 4px; }

    /* Settings */
    details summary {
      cursor: pointer;
      font-size: 11px;
      font-weight: 600;
      color: #5f6368;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      list-style: none;
      display: flex;
      align-items: center;
      gap: 4px;
    }
    details summary::before { content: '▸'; }
    details[open] summary::before { content: '▾'; }
    .settings-body { margin-top: 10px; }
    label { font-size: 12px; color: #5f6368; display: block; margin-bottom: 4px; }
    input[type="text"] {
      width: 100%;
      border: 1px solid #dadce0;
      border-radius: 4px;
      padding: 6px 8px;
      font-size: 13px;
      font-family: inherit;
      outline: none;
    }
    input[type="text"]:focus { border-color: #1a73e8; }
    .index-status { font-size: 11px; color: #5f6368; margin-top: 6px; min-height: 15px; }

    /* Auto toggle */
    .auto-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-top: 10px;
    }
    .auto-label { font-size: 12px; color: #5f6368; }
    .toggle {
      position: relative;
      width: 36px;
      height: 20px;
      flex-shrink: 0;
    }
    .toggle input { opacity: 0; width: 0; height: 0; }
    .toggle-track {
      position: absolute;
      inset: 0;
      background: #dadce0;
      border-radius: 20px;
      cursor: pointer;
      transition: background 0.2s;
    }
    .toggle input:checked + .toggle-track { background: #1a73e8; }
    .toggle-track::before {
      content: '';
      position: absolute;
      width: 14px;
      height: 14px;
      left: 3px;
      top: 3px;
      background: #fff;
      border-radius: 50%;
      transition: transform 0.2s;
    }
    .toggle input:checked + .toggle-track::before { transform: translateX(16px); }

    /* Insert button — big and prominent when suggestion is ready */
    #insert-btn {
      margin-top: 8px;
      background: #34a853;
      color: #fff;
      font-size: 14px;
      font-weight: 600;
      padding: 10px;
    }
    #insert-btn:hover { background: #2d9144; }
  </style>
</head>
<body>

  <div class="header">
    <h1>Weaver</h1>
    <div class="doc-title" id="doc-title">Loading…</div>
    <div class="auto-row">
      <span class="auto-label">Auto-complete</span>
      <label class="toggle">
        <input type="checkbox" id="auto-toggle" checked onchange="onAutoToggle(this.checked)">
        <span class="toggle-track"></span>
      </label>
    </div>
  </div>

  <!-- Completion -->
  <div class="section">
    <button class="btn-primary" id="complete-btn" onclick="onComplete()">Get Completion</button>
    <div id="suggestion-box"></div>
    <div class="btn-row" id="action-row" style="display:none">
      <button id="insert-btn" class="btn-primary" onclick="onInsert()">&#9166; Insert</button>
      <button class="btn-secondary" onclick="onDismiss()">Dismiss</button>
    </div>
    <div class="status" id="complete-status"></div>
  </div>

  <hr>

  <!-- Related docs -->
  <div class="section">
    <div class="section-label">Related Docs</div>
    <div id="results-list"><div class="status">Searching…</div></div>
  </div>

  <hr>

  <!-- Settings -->
  <details>
    <summary>Settings</summary>
    <div class="settings-body">
      <label for="backend-url-input">Backend URL</label>
      <input type="text" id="backend-url-input" placeholder="http://localhost:8000">
      <button class="btn-secondary" onclick="saveBackendUrl()" style="margin-top:8px">Save</button>

      <hr>
      <button class="btn-secondary" id="index-btn" onclick="onIndexFolder()">
        Index this folder
      </button>
      <div class="index-status" id="index-status"></div>
    </div>
  </details>

  <script>
    // ── State ──────────────────────────────────────────────────────────────────

    var backendUrl    = 'http://localhost:8000';
    var suggestion    = '';
    var abortCtrl     = null;
    var searchTimeout = null;
    var lastQuery     = '';

    // Auto-trigger polling state
    var autoEnabled      = true;
    var pollInFlight     = false;
    var lastPolledPrefix = null;  // null = not yet polled
    var prefixChangedAt  = 0;     // timestamp of last prefix change
    var QUIET_MS         = 1500;  // ms without change before triggering
    var POLL_MS          = 800;   // ms between polls

    // ── Init ───────────────────────────────────────────────────────────────────

    google.script.run
      .withSuccessHandler(function(url) {
        backendUrl = url;
        document.getElementById('backend-url-input').value = url;
        loadDocTitle();
        startPolling();
      })
      .getBackendUrl();

    function loadDocTitle() {
      google.script.run
        .withSuccessHandler(function(ctx) {
          document.getElementById('doc-title').textContent = ctx.documentTitle || '';
          scheduleSearch(ctx.prefix.slice(-200).trim());
        })
        .getCursorContext();
    }

    function onAutoToggle(enabled) {
      autoEnabled = enabled;
      if (!enabled) {
        if (abortCtrl) { abortCtrl.abort(); abortCtrl = null; }
        hideSuggestion();
        setStatus('complete-status', 'Auto-complete off.');
      } else {
        setStatus('complete-status', '');
        prefixChangedAt = Date.now(); // reset so it triggers fresh
      }
    }

    // ── Auto-trigger polling ───────────────────────────────────────────────────
    // Polls getCursorContext() every POLL_MS ms.
    // When prefix stabilises for QUIET_MS ms, fires a completion automatically.

    function startPolling() {
      setTimeout(poll, POLL_MS);
    }

    function poll() {
      if (pollInFlight) {
        setTimeout(poll, POLL_MS);
        return;
      }
      pollInFlight = true;

      google.script.run
        .withSuccessHandler(function(ctx) {
          pollInFlight = false;
          var prefix = ctx.prefix;

          if (lastPolledPrefix === null) {
            // First poll — just record, don't trigger yet
            lastPolledPrefix = prefix;
            prefixChangedAt  = Date.now();
          } else if (prefix !== lastPolledPrefix) {
            // Text changed — abort any running stream, dismiss suggestion
            lastPolledPrefix = prefix;
            prefixChangedAt  = Date.now();
            if (abortCtrl) { abortCtrl.abort(); abortCtrl = null; }
            hideSuggestion();
            setStatus('complete-status', '');
            scheduleSearch(prefix.slice(-200).trim());
          } else if (
            autoEnabled &&
            prefixChangedAt > 0 &&
            !abortCtrl &&
            !suggestion &&
            Date.now() - prefixChangedAt >= QUIET_MS
          ) {
            // Prefix stable long enough and no active stream — auto-trigger
            prefixChangedAt = 0; // prevent re-triggering for same position
            setStatus('complete-status', 'Auto-completing…');
            document.getElementById('complete-btn').disabled = true;
            startStream(ctx);
          }

          setTimeout(poll, POLL_MS);
        })
        .withFailureHandler(function() {
          pollInFlight = false;
          setTimeout(poll, POLL_MS * 2);
        })
        .getCursorContext();
    }

    // ── Completion ─────────────────────────────────────────────────────────────

    function onComplete() {
      setStatus('complete-status', 'Getting cursor context…');
      document.getElementById('complete-btn').disabled = true;
      hideSuggestion();

      google.script.run
        .withSuccessHandler(function(ctx) {
          setStatus('complete-status', 'Streaming…');
          startStream(ctx);
        })
        .withFailureHandler(function(err) {
          setStatus('complete-status', 'Error: ' + err.message, true);
          document.getElementById('complete-btn').disabled = false;
        })
        .getCursorContext();
    }

    function startStream(ctx) {
      if (abortCtrl) { abortCtrl.abort(); }
      abortCtrl = new AbortController();
      suggestion = '';

      fetch(backendUrl + '/api/complete', {
        method:  'POST',
        headers: { 'Content-Type': 'application/json' },
        body:    JSON.stringify({
          prefix:   ctx.prefix,
          suffix:   ctx.suffix,
          language: 'google-docs',
          query:    ctx.prefix.slice(-150).trim(),
          index:    'drive-docs',
        }),
        signal: abortCtrl.signal,
      })
      .then(function(res) {
        if (!res.ok) {
          return res.text().then(function(t) {
            throw new Error('HTTP ' + res.status + ': ' + t);
          });
        }

        var reader  = res.body.getReader();
        var decoder = new TextDecoder();
        var buffer  = '';

        function read() {
          reader.read().then(function(result) {
            if (result.done) {
              abortCtrl = null;
              document.getElementById('complete-btn').disabled = false;
              if (!suggestion) { setStatus('complete-status', ''); }
              return;
            }

            buffer += decoder.decode(result.value, { stream: true });
            var lines = buffer.split('\n');
            buffer = lines.pop() || '';

            for (var i = 0; i < lines.length; i++) {
              var line = lines[i];
              if (!line.startsWith('data: ')) { continue; }
              var data = line.slice(6).trim();
              if (data === '[DONE]') {
                setStatus('complete-status', 'Done — ' + suggestion.length + ' chars');
                abortCtrl = null;
                document.getElementById('complete-btn').disabled = false;
                return;
              }
              try {
                var evt = JSON.parse(data);
                if (evt.token) {
                  suggestion += evt.token;
                  showSuggestion(suggestion);
                }
              } catch (e) { /* ignore malformed SSE */ }
            }

            read();
          }).catch(function(err) {
            if (err.name !== 'AbortError') {
              setStatus('complete-status', 'Stream error: ' + err.message, true);
            }
            abortCtrl = null;
            document.getElementById('complete-btn').disabled = false;
          });
        }

        read();
      })
      .catch(function(err) {
        if (err.name !== 'AbortError') {
          setStatus('complete-status', 'Error: ' + err.message, true);
        }
        abortCtrl = null;
        document.getElementById('complete-btn').disabled = false;
      });
    }

    function showSuggestion(text) {
      var box = document.getElementById('suggestion-box');
      box.textContent = text;
      box.style.display = 'block';
      document.getElementById('action-row').style.display = 'flex';
    }

    function hideSuggestion() {
      document.getElementById('suggestion-box').style.display = 'none';
      document.getElementById('action-row').style.display = 'none';
      suggestion = '';
    }

    function onInsert() {
      if (!suggestion) { return; }
      var text = suggestion;
      hideSuggestion();
      setStatus('complete-status', 'Inserting…');
      google.script.run
        .withSuccessHandler(function() { setStatus('complete-status', 'Inserted.'); })
        .withFailureHandler(function(err) {
          setStatus('complete-status', 'Insert failed: ' + err.message, true);
        })
        .insertAtCursor(text);
    }

    function onDismiss() {
      if (abortCtrl) { abortCtrl.abort(); abortCtrl = null; }
      hideSuggestion();
      prefixChangedAt = 0; // don't re-trigger at same position
      setStatus('complete-status', '');
    }

    // ── Related docs search ────────────────────────────────────────────────────

    function scheduleSearch(query) {
      if (!query || query === lastQuery) { return; }
      clearTimeout(searchTimeout);
      searchTimeout = setTimeout(function() { runSearch(query); }, 400);
    }

    function runSearch(query) {
      lastQuery = query;
      fetch(backendUrl + '/api/search', {
        method:  'POST',
        headers: { 'Content-Type': 'application/json' },
        body:    JSON.stringify({ query: query, size: 5, index: 'drive-docs' }),
      })
      .then(function(r) { return r.json(); })
      .then(function(data) { renderResults(data.results || []); })
      .catch(function(err) {
        document.getElementById('results-list').innerHTML =
          '<div class="status error">Search error: ' + esc(err.message) + '</div>';
      });
    }

    function renderResults(results) {
      var list = document.getElementById('results-list');
      if (!results.length) {
        list.innerHTML = '<div class="status">No results.</div>';
        return;
      }
      list.innerHTML = results.map(function(r) {
        return '<div class="result-item">' +
          '<div class="result-title">' + esc(r.title || r.endpoint || '—') + '</div>' +
          '<div class="result-snippet">' + esc((r.parameters || r.content || '').slice(0, 120)) + '</div>' +
          '</div>';
      }).join('');
    }

    // ── Settings ───────────────────────────────────────────────────────────────

    function saveBackendUrl() {
      var url = document.getElementById('backend-url-input').value.trim();
      backendUrl = url;
      google.script.run
        .withSuccessHandler(function() { setStatus('index-status', 'Saved.'); })
        .setBackendUrl(url);
    }

    function onIndexFolder() {
      document.getElementById('index-btn').disabled = true;
      setStatus('index-status', 'Indexing…');
      google.script.run
        .withSuccessHandler(function(msg) {
          setStatus('index-status', msg);
          document.getElementById('index-btn').disabled = false;
        })
        .withFailureHandler(function(err) {
          setStatus('index-status', 'Error: ' + err.message, true);
          document.getElementById('index-btn').disabled = false;
        })
        .indexFolder();
    }

    // ── Helpers ────────────────────────────────────────────────────────────────

    function setStatus(id, msg, isError) {
      var el = document.getElementById(id);
      el.textContent  = msg;
      el.className    = 'status' + (isError ? ' error' : '');
    }

    function esc(s) {
      return String(s)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;');
    }
  </script>
</body>
</html>
