<!DOCTYPE html>
<html lang="en">
<head>
  <base target="_top">
  <meta charset="utf-8">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Google Sans', Roboto, Arial, sans-serif;
      font-size: 13px;
      color: #202124;
      background: #fff;
      padding: 12px;
    }

    /* Header */
    .header { margin-bottom: 12px; }
    .header h1 { font-size: 15px; font-weight: 600; color: #1a73e8; }
    .doc-title {
      font-size: 11px;
      color: #5f6368;
      margin-top: 2px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    /* Buttons */
    button {
      display: block;
      width: 100%;
      padding: 8px 12px;
      border: none;
      border-radius: 4px;
      font-size: 13px;
      font-family: inherit;
      cursor: pointer;
      transition: background 0.15s;
    }
    .btn-secondary {
      background: #fff;
      color: #1a73e8;
      border: 1px solid #dadce0;
      margin-top: 6px;
    }
    .btn-secondary:hover { background: #f1f3f4; }
    .btn-secondary:disabled { color: #aaa; border-color: #eee; cursor: default; }

    /* Sections */
    .section { margin-top: 14px; }
    .section-label {
      font-size: 11px;
      font-weight: 600;
      color: #5f6368;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 6px;
    }
    hr { border: none; border-top: 1px solid #f1f3f4; margin: 14px 0; }

    /* Status */
    .status {
      font-size: 11px;
      color: #5f6368;
      margin-top: 6px;
      min-height: 15px;
    }
    .status.error { color: #d93025; }

    /* Related docs */
    .result-item {
      padding: 6px 0;
      border-bottom: 1px solid #f1f3f4;
    }
    .result-item:last-child { border-bottom: none; }
    .result-title { font-weight: 500; font-size: 12px; color: #202124; }
    .result-snippet {
      font-size: 11px;
      color: #5f6368;
      margin-top: 2px;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    #results-list { margin-top: 4px; }

    /* Settings */
    details summary {
      cursor: pointer;
      font-size: 11px;
      font-weight: 600;
      color: #5f6368;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      list-style: none;
      display: flex;
      align-items: center;
      gap: 4px;
    }
    details summary::before { content: '▸'; }
    details[open] summary::before { content: '▾'; }
    .settings-body { margin-top: 10px; }
    label { font-size: 12px; color: #5f6368; display: block; margin-bottom: 4px; }
    input[type="text"] {
      width: 100%;
      border: 1px solid #dadce0;
      border-radius: 4px;
      padding: 6px 8px;
      font-size: 13px;
      font-family: inherit;
      outline: none;
    }
    input[type="text"]:focus { border-color: #1a73e8; }
    .index-status { font-size: 11px; color: #5f6368; margin-top: 6px; min-height: 15px; }
  </style>
</head>
<body>

  <div class="header">
    <h1>Weaver</h1>
    <div class="doc-title" id="doc-title">Loading…</div>
  </div>

  <!-- Related docs -->
  <div class="section">
    <div class="section-label">Related Docs</div>
    <div id="results-list"><div class="status">Searching…</div></div>
  </div>

  <hr>

  <!-- Settings -->
  <details>
    <summary>Settings</summary>
    <div class="settings-body">
      <label for="backend-url-input">Backend URL</label>
      <input type="text" id="backend-url-input" placeholder="http://localhost:8000">
      <button class="btn-secondary" onclick="saveBackendUrl()" style="margin-top:8px">Save</button>

      <hr>
      <button class="btn-secondary" id="index-btn" onclick="onIndexFolder()">
        Index this folder
      </button>
      <div class="index-status" id="index-status"></div>
    </div>
  </details>

  <script>
    // ── State ──────────────────────────────────────────────────────────────────

    var backendUrl       = 'http://localhost:8000';
    var searchTimeout    = null;
    var lastQuery        = '';
    var pollInFlight     = false;
    var lastPolledPrefix = null;
    var POLL_MS          = 1500;

    // ── Init ───────────────────────────────────────────────────────────────────

    google.script.run
      .withSuccessHandler(function(url) {
        backendUrl = url;
        document.getElementById('backend-url-input').value = url;
        loadDocTitle();
        startPolling();
      })
      .getBackendUrl();

    function loadDocTitle() {
      google.script.run
        .withSuccessHandler(function(ctx) {
          document.getElementById('doc-title').textContent = ctx.documentTitle || '';
          scheduleSearch(ctx.prefix.slice(-200).trim());
          postContextToBackend(ctx);
        })
        .getCursorContext();
    }

    // ── Context polling ────────────────────────────────────────────────────────
    // Keeps the desktop panel relay current and triggers related-docs search
    // whenever the document text changes.

    function startPolling() {
      setTimeout(poll, POLL_MS);
      setTimeout(checkPendingInsert, 2000);
    }

    function poll() {
      if (pollInFlight) {
        setTimeout(poll, POLL_MS);
        return;
      }
      pollInFlight = true;

      google.script.run
        .withSuccessHandler(function(ctx) {
          pollInFlight = false;
          var prefix = ctx.prefix;

          if (lastPolledPrefix === null || prefix !== lastPolledPrefix) {
            lastPolledPrefix = prefix;
            scheduleSearch(prefix.slice(-200).trim());
            postContextToBackend(ctx);
          }

          setTimeout(poll, POLL_MS);
        })
        .withFailureHandler(function() {
          pollInFlight = false;
          setTimeout(poll, POLL_MS * 2);
        })
        .getCursorContext();
    }

    // ── Related docs search ────────────────────────────────────────────────────

    function scheduleSearch(query) {
      if (!query || query === lastQuery) { return; }
      clearTimeout(searchTimeout);
      searchTimeout = setTimeout(function() { runSearch(query); }, 400);
    }

    function runSearch(query) {
      lastQuery = query;
      fetch(backendUrl + '/api/search', {
        method:  'POST',
        headers: { 'Content-Type': 'application/json' },
        body:    JSON.stringify({ query: query, size: 5, index: 'drive-docs' }),
      })
      .then(function(r) { return r.json(); })
      .then(function(data) { renderResults(data.results || []); })
      .catch(function(err) {
        document.getElementById('results-list').innerHTML =
          '<div class="status error">Search error: ' + esc(err.message) + '</div>';
      });
    }

    function renderResults(results) {
      var list = document.getElementById('results-list');
      if (!results.length) {
        list.innerHTML = '<div class="status">No results.</div>';
        return;
      }
      list.innerHTML = results.map(function(r) {
        return '<div class="result-item">' +
          '<div class="result-title">' + esc(r.title || r.endpoint || '—') + '</div>' +
          '<div class="result-snippet">' + esc((r.parameters || r.content || '').slice(0, 120)) + '</div>' +
          '</div>';
      }).join('');
    }

    // ── Settings ───────────────────────────────────────────────────────────────

    function saveBackendUrl() {
      var url = document.getElementById('backend-url-input').value.trim();
      backendUrl = url;
      google.script.run
        .withSuccessHandler(function() { document.getElementById('index-status').textContent = 'Saved.'; })
        .setBackendUrl(url);
    }

    function onIndexFolder() {
      document.getElementById('index-btn').disabled = true;
      document.getElementById('index-status').textContent = 'Indexing…';
      google.script.run
        .withSuccessHandler(function(msg) {
          document.getElementById('index-status').textContent = msg;
          document.getElementById('index-btn').disabled = false;
        })
        .withFailureHandler(function(err) {
          document.getElementById('index-status').textContent = 'Error: ' + err.message;
          document.getElementById('index-btn').disabled = false;
        })
        .indexFolder();
    }

    // ── Helpers ────────────────────────────────────────────────────────────────

    function esc(s) {
      return String(s)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;');
    }

    // ── Desktop panel bridge ───────────────────────────────────────────────────

    function postContextToBackend(ctx) {
      fetch(backendUrl + '/api/gdocs/context', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          docTitle: ctx.documentTitle || '',
          prefix:   ctx.prefix,
          suffix:   ctx.suffix,
        }),
      }).catch(function() {}); // silent — backend may be offline
    }

    function checkPendingInsert() {
      fetch(backendUrl + '/api/gdocs/pending-insert')
        .then(function(r) { return r.json(); })
        .then(function(data) {
          if (data.pending && data.text) {
            google.script.run
              .withSuccessHandler(function() {})
              .withFailureHandler(function() {})
              .insertAtCursor(data.text);
          }
        })
        .catch(function() {})
        .finally(function() { setTimeout(checkPendingInsert, 2000); });
    }
  </script>
</body>
</html>
